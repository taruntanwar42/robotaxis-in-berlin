name: Deploy Hugging Face Space

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deploy dependency
        run: python -m pip install huggingface_hub

      - name: Deploy Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python scripts/deploy_hf_space.py --repo-id icybean/robotaxi-sumo-backend

      - name: Smoke-check Space
        run: >-
          python scripts/smoke_backend.py
          --base-url https://icybean-robotaxi-sumo-backend.hf.space
          --retries 12
          --retry-delay-sec 20
